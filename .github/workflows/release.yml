name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  RELEASE_APK:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          # JDK 17 matches F-Droid's build server and gives deterministic classes.dex
          # (JDK 21 emits subtly different bytecode).
          java-version: 17
          distribution: temurin
          cache: 'gradle'

      - name: Run Detekt
        run: ./gradlew detekt --stacktrace

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build release APK
        # Build the github flavor specifically; the fdroid flavor is compiled by the
        # F-Droid build server from fdroiddata metadata.
        run: ./gradlew app:assembleGithubRelease -PfrigateViewerBuildRoot=${{ github.workspace }}/build-output --stacktrace
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK=$(find build-output/app/outputs/apk/github/release -name "*.apk" | head -1)
          mv "$APK" "build-output/phylax-${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            "build-output/phylax-${{ steps.version.outputs.version }}.apk" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file WHATSNEW.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
