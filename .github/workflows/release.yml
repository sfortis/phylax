name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  RELEASE_APK:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          # JDK 21 matches F-Droid's build server (they install openjdk-21-jdk-headless).
          java-version: 21
          distribution: temurin
          cache: 'gradle'

      - name: Run Detekt
        run: ./gradlew detekt --stacktrace

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build release APKs (both flavors)
        # github flavor = primary asset for users side-loading from GitHub (in-app updater).
        # fdroid flavor = reproducibility target for F-Droid; Binaries URL in fdroiddata points here.
        run: ./gradlew app:assembleGithubRelease app:assembleFdroidRelease -PfrigateViewerBuildRoot=${{ github.workspace }}/build-output --stacktrace
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Stage release APKs
        run: |
          GH_APK=$(find build-output/app/outputs/apk/github/release -name "*.apk" | head -1)
          FD_APK=$(find build-output/app/outputs/apk/fdroid/release -name "*.apk" | head -1)
          mv "$GH_APK" "build-output/phylax-${{ steps.version.outputs.version }}.apk"
          mv "$FD_APK" "build-output/phylax-fdroid-${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            "build-output/phylax-${{ steps.version.outputs.version }}.apk" \
            "build-output/phylax-fdroid-${{ steps.version.outputs.version }}.apk" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file WHATSNEW.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
